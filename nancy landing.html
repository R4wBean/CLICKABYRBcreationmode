<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Message Me</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e9edf1;
    font-family:Arial, sans-serif;
}

.card{
    background:white;
    padding:40px 30px;
    border-radius:20px;
    text-align:center;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.profile{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover; /* auto crop */
    object-position:center; /* keep center of image */
    margin-bottom:20px;
    border:5px solid #f2f2f2;
}

.name{
    font-size:26px;
    font-weight:bold;
    margin-bottom:5px;
}

.bio{
    font-size:14px;
    color:#666;
    margin-bottom:25px;
}

.btn{
    display:inline-block;
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#0088cc;
    color:white;
    cursor:pointer;
}

.btn:hover{
    background:#0a79b6;
}
</style>
</head>

<body>

<div class="card">

<img src="nanacy.jpg" class="profile">

<div class="name">Nancy Williams</div>

<div class="bio">Tap below to chat with me on Telegram 💬</div>

<button class="btn" onclick="goToLink()">Message Me</button>

</div>

<script>
function goToLink(){
    window.location.href = "https://telegram.me/nnancy_williams";
}
</script>

</body>
</html>
